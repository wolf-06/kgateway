apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-proxy-protocol-conf
  namespace: kgateway-base
data:
  nginx.conf: |
    user nginx;
    worker_processes 1;
    events {
      worker_connections 10240;
    }
    http {
      server {
        listen 80 proxy_protocol;
        server_name example.com;

        set_real_ip_from 0.0.0.0/0;
        real_ip_header proxy_protocol;

        location / {
          add_header X-Proxy-Protocol-Addr $proxy_protocol_addr always;
          return 200 "proxy-protocol-ok\n";
        }
      }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: kgateway-base
  labels:
    app.kubernetes.io/name: nginx
spec:
  terminationGracePeriodSeconds: 0
  containers:
  - name: nginx
    image: nginx:1.28.0
    ports:
    - containerPort: 80
      name: http-web-svc
    volumeMounts:
    - name: nginx-conf
      mountPath: /etc/nginx/
      readOnly: true
  volumes:
  - name: nginx-conf
    configMap:
      name: nginx-proxy-protocol-conf
      items:
      - key: nginx.conf
        path: nginx.conf
---
apiVersion: v1
kind: Service
metadata:
  name: upstream-pp-svc
  namespace: kgateway-base
spec:
  selector:
    app.kubernetes.io/name: nginx
  ports:
  - protocol: TCP
    port: 8080
    targetPort: http-web-svc
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
  namespace: kgateway-base
spec:
  parentRefs:
    - name: gateway
      namespace: kgateway-base
  hostnames:
    - "example.com"
  rules:
    - backendRefs:
        - name: upstream-pp-svc
          port: 8080
---
kind: BackendConfigPolicy
apiVersion: gateway.kgateway.dev/v1alpha1
metadata:
  name: upstream-pp-policy
  namespace: kgateway-base
spec:
  targetRefs:
    - name: upstream-pp-svc
      group: ""
      kind: Service
  upstreamProxyProtocol:
    version: V1
